[tool.uv.workspace]
members = [
  "packages/payment-fee",
  "services/payment-fee-service",
  "tools/paypal-sandbox-validation",
]

[tool.uv]
package = true

[tool.ruff]
line-length = 120
exclude = ["paypal-fee-data", "stripe-fee-data", ".venv", "dist", "node_modules"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "SIM", "B"]
ignore = ["B905"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pyright]
include = ["packages/payment-fee/src", "services/payment-fee-service/src"]
exclude = ["**/__pycache__", "**/.venv", "**/build", "**/dist"]
pythonVersion = "3.12"
venvPath = "."
venv = ".venv"
reportIncompatibleVariableOverride = false

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "live: tests that hit the live network",
    "e2e: tests that start a real HTTP server",
]
