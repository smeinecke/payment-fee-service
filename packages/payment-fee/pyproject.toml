[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "payment-fee"
version = "0.2.0"
description = "Reusable payment-provider fee calculation library."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "smeinecke" }]
dependencies = [
  "pydantic>=2.10,<3",
  "jsonschema>=4.23,<5",
]

[project.optional-dependencies]
http = [
  "httpx>=0.27,<1",
]
dev = [
  "pytest>=8.3,<10",
  "pytest-cov>=6,<8",
  "ruff>=0.9,<1",
  "pyright>=1.1.370",
  "bandit>=1.7.9",
]

[project.scripts]
payment-fee = "payment_fee.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
  "-q",
  "--strict-markers",
  "--import-mode=importlib",
  "--cov=payment_fee",
  "--cov-report=term-missing",
]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.pyright]
include = ["src"]
exclude = ["**/__pycache__", "**/.venv", "**/build", "**/dist"]
pythonVersion = "3.12"
venvPath = "."
venv = ".venv"
reportIncompatibleVariableOverride = false

[tool.bandit]
exclude_dirs = [".venv", "build", "dist", "tests", "docs"]
