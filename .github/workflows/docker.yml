name: Docker

on:
  push:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          enable-cache: true

      - name: Verify uv lockfile is in sync
        run: uv lock --check

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and load single-platform image for checks
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: payment-fee-service:smoke
          cache-from: type=gha

      - name: Image content assertions
        run: |
          docker run --rm payment-fee-service:smoke python -c \
            "import payment_fee, payment_fee_service; print('production imports ok')"
          docker run --rm payment-fee-service:smoke payment-fee-service --help >/dev/null

          if docker run --rm payment-fee-service:smoke python -c "import paypal_sandbox_validation" 2>/dev/null; then
            echo "FAIL: paypal_sandbox_validation is installed but must be absent" >&2
            exit 1
          fi
          if docker run --rm payment-fee-service:smoke python -c "import playwright" 2>/dev/null; then
            echo "FAIL: playwright is installed but must be absent" >&2
            exit 1
          fi

          docker run --rm payment-fee-service:smoke bash -c \
            'for p in /app/paypal-sandbox /app/playwright /app/accounts.csv /app/artifacts/paypal-sandbox; do test ! -e "$p" || { echo "FAIL: $p exists in image"; exit 1; }; done'

      - name: Service smoke checks
        run: |
          docker run -d --rm -p 127.0.0.1:8000:8000 --name pfs payment-fee-service:smoke
          cleanup() { docker stop pfs >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health/ready || true)
            if [ "$code" = "200" ]; then
              echo "health/ready: 200"
              break
            fi
            sleep 1
          done
          [ "$code" = "200" ] || { echo "FAIL: /health/ready never returned 200 (last: $code)" >&2; exit 1; }

          curl -fs http://127.0.0.1:8000/health/live

      - name: Build and push multi-platform image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
